    <script>
      (function () {
        try {
          var stored = localStorage.getItem('dnet-theme');
          if (stored === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
